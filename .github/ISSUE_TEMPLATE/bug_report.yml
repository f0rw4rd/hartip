name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `pip show hartip-py` or git commit hash
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: protocol
    attributes:
      label: Protocol / Transport
      options:
        - UDP (default)
        - TCP
        - TLS (HART-IP v2)
        - Direct PDU (v2)
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue
      render: python
    validations:
      required: true

  - type: textarea
    id: device
    attributes:
      label: Device / Environment
      description: Device manufacturer/model, Python version, OS
      placeholder: |
        - Device: Emerson Rosemount 3051
        - Python: 3.12.1
        - OS: Ubuntu 24.04
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Paste any error output or Wireshark captures
      render: text
    validations:
      required: false
